<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Шпион-Художник | ОНЛАЙН</title>
    <style>
        :root { --primary: #004d99; --secondary: #ffcc00; --bg: #f4f4f4; --danger: #cc0000; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 10px; }
        .container { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; }
        .hidden { display: none; }
        input { padding: 12px; border: 2px solid #ddd; border-radius: 8px; width: 80%; margin-bottom: 10px; font-size: 16px; }
        button { padding: 10px 20px; border: none; border-radius: 8px; background: var(--primary); color: white; cursor: pointer; font-weight: bold; margin: 5px; }
        button:hover { opacity: 0.9; }
        button.danger { background: var(--danger); }
        #canvas { border: 2px solid #333; background: white; cursor: crosshair; touch-action: none; border-radius: 8px; display: block; margin: 10px auto; max-width: 100%; }
        .player-list { list-style: none; padding: 0; text-align: left; background: #eee; border-radius: 8px; padding: 10px; margin-bottom: 15px;}
        .status-bar { font-weight: bold; color: var(--primary); margin-bottom: 10px; font-size: 1.1em; }
        footer { margin-top: 15px; font-size: 0.8em; color: #888; }
        footer a { color: var(--primary); text-decoration: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>Шпион-Художник</h1>

    <div id="screen-auth">
        <input type="text" id="input-nick" placeholder="Введи свой никнейм">
        <button onclick="saveNick()">Войти</button>
    </div>

    <div id="screen-menu" class="hidden">
        <h2 id="welcome-msg"></h2>
        <button onclick="createLobby()">Создать лобби</button>
        <button onclick="joinLobby()">Присоединиться</button>
    </div>

    <div id="screen-lobby" class="hidden">
        <h3>Код: <span id="lobby-code-display" style="color:red"></span></h3>
        <p>Игроки:</p>
        <ul id="list-players" class="player-list"></ul>
        <button id="btn-start" class="hidden" onclick="hostStartGame()">Начать игру</button>
        <p id="wait-msg">Ждем игроков...</p>
    </div>

    <div id="screen-role" class="hidden">
        <h2 id="role-display"></h2>
        <p>Секретное слово:</p>
        <h1 id="word-display" style="background: #eee; padding: 15px; border-radius: 10px;"></h1>
        <button onclick="confirmRole()">Поехали!</button>
    </div>

    <div id="screen-draw" class="hidden">
        <div id="turn-info" class="status-bar">Загрузка...</div>
        <canvas id="canvas" width="400" height="450"></canvas>
        <div id="draw-controls">
            <button id="btn-finish-line" class="hidden" onclick="finishTurn()">Закончил линию</button>
            <button id="btn-spy-guess" class="hidden danger" onclick="showSpyGuessScreen()">Я знаю слово!</button>
            <p id="txt-wait-turn">Сейчас не твой ход</p>
        </div>
    </div>

    <div id="screen-vote" class="hidden">
        <h2>Кто шпион?</h2>
        <div id="vote-buttons"></div>
        <hr>
        <button id="btn-skip-vote" onclick="castVote('skip')" style="background: #777;">Пропустить раунд</button>
    </div>

    <div id="screen-spy-guess" class="hidden">
        <h2>Шпион, угадай слово!</h2>
        <p>У тебя только 1 попытка.</p>
        <input type="text" id="spy-guess-input" placeholder="Слово...">
        <br>
        <button onclick="spyGuessWord()">Проверить</button>
        <button onclick="showScreen('screen-draw')" style="background: #777;">Назад</button>
    </div>

    <div id="screen-results" class="hidden">
        <h2 id="result-text"></h2>
        <p id="spy-info" style="font-size: 1.2em; font-weight: bold; color: #004d99;"></p>
        <button onclick="returnToLobby()">Вернуться в лобби</button>
    </div>

    <footer>made by <a href="https://t.me/+fKYj8vE7cPI4ZDAy" target="_blank">froelly</a></footer>
</div>

<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA0kKBScpGk2Ym7ziX65XC1erJUDBBSIoQ",
        authDomain: "froelly-a4d64.firebaseapp.com",
        projectId: "froelly-a4d64",
        storageBucket: "froelly-a4d64.firebasestorage.app",
        messagingSenderId: "724747270322",
        appId: "1:724747270322:web:5e68d281360db9c249f1ab",
        databaseURL: "https://froelly-a4d64-default-rtdb.firebaseio.com/"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let myNick = "", lobbyId = "", isHost = false, hasSeenRole = false, currentLobbyData = null;
    const allWords = ["Яблоко", "Банан", "Гитара", "Вертолет", "Футбол", "Пицца", "Космонавт", "Замок", "Океан", "Дракон", "Компьютер", "Телефон", "Слон", "Тигр", "Шоколад", "Мороженое", "Ракета", "Пират", "Ниндзя", "Король", "Рыцарь", "Велосипед", "Автобус", "Поезд", "Корабль", "Самолет", "Танк", "Скрипка", "Пианино", "Барабан", "Кактус", "Пальма", "Солнце", "Луна", "Звезда", "Облако", "Радуга", "Молния", "Снеговик", "Зонт", "Очки", "Часы", "Ключ", "Молоток", "Лампочка", "Книга", "Карандаш", "Краски", "Робот", "Скейтборд", "Кенгуру", "Пингвин", "Жираф", "Зебра", "Хомяк", "Попугай", "Черепаха", "Акула", "Медуза", "Осьминог", "Бабочка", "Пчела", "Паук", "Гриб", "Арбуз", "Ананас", "Бургер", "Пончик", "Суши", "Яичница", "Кофе", "Чайник", "Холодильник", "Пылесос", "Телевизор", "Микроскоп", "Телескоп", "Компас", "Карта", "Палатка", "Костер", "Глобус", "Мост", "Эйфелева башня", "Статуя Свободы", "Пирамида", "Вулкан", "Пустыня", "Джунгли", "Ледник", "Пещера", "Водопад", "Остров", "Мельница", "Маяк", "Фонтан", "Качели", "Цирк", "Театр", "Музей", "Библиотека", "Школа", "Аптека", "Больница", "Почта", "Банк", "Тюрьма", "Полиция", "Пожарный", "Повар", "Врач", "Учитель", "Фермер", "Космос", "Планета", "Комета", "Черная дыра", "Инопланетянин", "Магия", "Привидение", "Зомби", "Вампир", "Оборотень", "Русалка", "Единорог", "Фея", "Гном", "Тролль"];

    function showScreen(id) {
        document.querySelectorAll('.container > div').forEach(d => d.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    function saveNick() {
        myNick = document.getElementById('input-nick').value.trim();
        if (myNick.length < 2) return alert("Ник короткий!");
        localStorage.setItem('playerNick', myNick);
        document.getElementById('welcome-msg').innerText = "Привет, " + myNick;
        showScreen('screen-menu');
    }

    function createLobby() {
        isHost = true;
        lobbyId = Math.random().toString(36).substring(2, 6).toUpperCase();
        db.ref('lobbies/' + lobbyId).set({ status: 'waiting', players: [myNick], host: myNick });
        connectToFirebase();
    }

    function joinLobby() {
        const code = prompt("Код:").toUpperCase();
        if (!code) return;
        db.ref('lobbies/' + code).once('value', snap => {
            if (!snap.exists()) return alert("Нет такой игры!");
            lobbyId = code;
            let pList = snap.val().players || [];
            if (!pList.includes(myNick)) pList.push(myNick);
            db.ref('lobbies/' + lobbyId).update({ players: pList });
            connectToFirebase();
        });
    }

    function connectToFirebase() {
        showScreen('screen-lobby');
        document.getElementById('lobby-code-display').innerText = lobbyId;

        db.ref('lobbies/' + lobbyId).on('value', snap => {
            currentLobbyData = snap.val();
            if (!currentLobbyData) return;
            
            const playersInLobby = currentLobbyData.players || [];
            document.getElementById('list-players').innerHTML = playersInLobby.map(p => {
                let status = (currentLobbyData.status !== 'waiting' && currentLobbyData.alivePlayers && !currentLobbyData.alivePlayers.includes(p)) ? " <span style='color:red'>(Выбыл)</span>" : "";
                return `<li>⚽️ ${p}${status}</li>`;
            }).join('');

            if (isHost && playersInLobby.length >= 3 && currentLobbyData.status === 'waiting') {
                document.getElementById('btn-start').classList.remove('hidden');
            } else {
                document.getElementById('btn-start').classList.add('hidden');
            }

            if (currentLobbyData.status === 'playing') {
                if (!hasSeenRole) showRoleScreen(currentLobbyData);
                else updateDrawingScreen(currentLobbyData);
            } else if (currentLobbyData.status === 'voting') {
                showVoteScreen(currentLobbyData);
            } else if (currentLobbyData.status === 'results') {
                showResultsScreen(currentLobbyData);
            }
        });

        // Слушатель очистки доски
        db.ref('drawings/' + lobbyId).on('value', snap => {
            if (!snap.exists()) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
        });

        db.ref('drawings/' + lobbyId).on('child_added', snap => {
            drawRemoteLine(snap.val());
        });
    }

    function hostStartGame() {
        db.ref('drawings/' + lobbyId).set(null); // Очищаем доску в БД
        const word = allWords[Math.floor(Math.random() * allWords.length)];
        const spy = currentLobbyData.players[Math.floor(Math.random() * currentLobbyData.players.length)];
        db.ref('lobbies/' + lobbyId).update({
            status: 'playing', word: word, spy: spy, currentTurn: 0,
            alivePlayers: currentLobbyData.players, votes: null, resultText: null
        });
    }

    function showRoleScreen(data) {
hasSeenRole = true;
        const imSpy = (data.spy === myNick);
        document.getElementById('role-display').innerText = imSpy ? "ТЫ ШПИОН!" : "ТЫ ХУДОЖНИК";
        document.getElementById('role-display').style.color = imSpy ? "red" : "green";
        document.getElementById('word-display').innerText = imSpy ? "???" : data.word;
        showScreen('screen-role');
    }

    function confirmRole() {
        showScreen('screen-draw');
        initCanvas();
        if (currentLobbyData) updateDrawingScreen(currentLobbyData);
    }

    function updateDrawingScreen(data) {
        showScreen('screen-draw');
        const alive = data.alivePlayers || data.players;
        const turnNick = alive[data.currentTurn % alive.length];
        const isMyTurn = (turnNick === myNick);
        window.isMyTurnNow = isMyTurn;

        document.getElementById('turn-info').innerText = isMyTurn ? "ТВОЙ ХОД! Рисуй" : "Рисует: " + turnNick;
        document.getElementById('btn-finish-line').classList.toggle('hidden', !isMyTurn);
        document.getElementById('txt-wait-turn').classList.toggle('hidden', isMyTurn);
        document.getElementById('btn-spy-guess').classList.toggle('hidden', !(data.spy === myNick && isMyTurn));
    }

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let drawing = false, lastX, lastY;

    function initCanvas() {
        ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.strokeStyle = '#000';
        canvas.onmousedown = startDrawing; canvas.onmousemove = moveDrawing; canvas.onmouseup = stopDrawing;
        canvas.ontouchstart = (e) => { e.preventDefault(); startDrawing(e.touches[0]); };
        canvas.ontouchmove = (e) => { e.preventDefault(); moveDrawing(e.touches[0]); };
        canvas.ontouchend = stopDrawing;
    }

    function startDrawing(e) {
        if (!window.isMyTurnNow) return;
        drawing = true;
        const rect = canvas.getBoundingClientRect();
        lastX = (e.clientX || e.pageX) - rect.left;
        lastY = (e.clientY || e.pageY) - rect.top;
    }

    function moveDrawing(e) {
        if (!drawing || !window.isMyTurnNow) return;
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX || e.pageX) - rect.left;
        const y = (e.clientY || e.pageY) - rect.top;
        ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(x, y); ctx.stroke();
        db.ref('drawings/' + lobbyId).push({ x1: lastX, y1: lastY, x2: x, y2: y });
        lastX = x; lastY = y;
    }

    function stopDrawing() { drawing = false; }
    function drawRemoteLine(l) {
        ctx.beginPath(); ctx.moveTo(l.x1, l.y1); ctx.lineTo(l.x2, l.y2); ctx.stroke();
    }

    function finishTurn() {
        let next = currentLobbyData.currentTurn + 1;
        if (next >= currentLobbyData.alivePlayers.length) {
            db.ref('lobbies/' + lobbyId).update({ status: 'voting' });
        } else {
            db.ref('lobbies/' + lobbyId).update({ currentTurn: next });
        }
    }

    function showVoteScreen(data) {
        showScreen('screen-vote');
        const box = document.getElementById('vote-buttons');
        box.innerHTML = "";
        data.alivePlayers.forEach(p => {
            if (p === myNick) return;
            let btn = document.createElement('button');
            btn.innerText = p;
            btn.onclick = () => castVote(p);
            box.appendChild(btn);
        });
        document.getElementById('btn-skip-vote').disabled = false;
    }

    function castVote(target) {
        db.ref('lobbies/' + lobbyId + '/votes/' + myNick).set(target);
        alert("Голос принят! Ждем остальных...");
        document.querySelectorAll('#vote-buttons button').forEach(b => b.disabled = true);
        document.getElementById('btn-skip-vote').disabled = true;

        if (isHost) {
            db.ref('lobbies/' + lobbyId + '/votes').on('value', snap => {
                const v = snap.val();
                if (v && Object.keys(v).length >= currentLobbyData.alivePlayers.length) {
                    db.ref('lobbies/' + lobbyId + '/votes').off();
                    processResults(v);
                }
            });
        }
    }

    function processResults(votes) {
        let counts = {};
        let skipCount = 0;
        for (let p in votes) {
            if (votes[p] === 'skip') skipCount++;
            else counts[votes[p]] = (counts[votes[p]] || 0) + 1;
        }

        let max = 0, votedOut = "skip";
        for (let p in counts) { if (counts[p] > max) { max = counts[p]; votedOut = p; } }

        if (skipCount >= max) {
            alert("Голосование пропущено! Продолжаем.");
            db.ref('lobbies/' + lobbyId).update({ status: 'playing', currentTurn: 0, votes: null });
        } else {
            alert("Голосование завершено! Выгнали: " + votedOut);
            const data = currentLobbyData;
            if (votedOut === data.spy) {
                endGame("Художники победили! Шпион был пойман.", data.spy, data.word);
            } else {
                let newAlive = data.alivePlayers.filter(p => p !== votedOut);
                if (newAlive.length <= 2) {
                    endGame("Шпион победил! Художников осталось слишком мало.", data.spy, data.word);
                } else {
                    db.ref('lobbies/' + lobbyId).update({ status: 'playing', currentTurn: 0, alivePlayers: newAlive, votes: null });
                }
            }
        }
    }

    function showSpyGuessScreen() { showScreen('screen-spy-guess'); }

    function spyGuessWord() {
        const guess = document.getElementById('spy-guess-input').value.trim().toLowerCase();
        if (guess === currentLobbyData.word.toLowerCase()) {
            endGame("Шпион угадал слово и победил!", myNick, currentLobbyData.word);
        } else {
            endGame("Шпион ошибся! Художники победили.", currentLobbyData.spy, currentLobbyData.word);
        }
    }

    function endGame(text, spy, word) {
        db.ref('lobbies/' + lobbyId).update({ status: 'results', resultText: text, finalSpy: spy, finalWord: word });
    }

    function showResultsScreen(data) {
        showScreen('screen-results');
        document.getElementById('result-text').innerText = data.resultText;
        document.getElementById('spy-info').innerText = `Шпион: ${data.finalSpy} | Слово: ${data.finalWord}`;
    }

    function returnToLobby() {
        hasSeenRole = false;
        db.ref('lobbies/' + lobbyId).update({ 
            status: 'waiting', alivePlayers: null, votes: null, spy: null, word: null, resultText: null 
        });
        showScreen('screen-lobby');
    }

    window.onload = () => {
        const stored = localStorage.getItem('playerNick');
        if (stored) document.getElementById('input-nick').value = stored;
    };
</script>
</body>
</html>
